services:
  backend:
    build:
      target: development
    environment:
      - NODE_ENV=development
    volumes:
      - ./Backend:/app
      - /app/node_modules
    command: ["npx", "nodemon", "server.js"]

  frontend:
    build:
      target: development
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./Frontend/src:/app/src
      - /app/node_modules
